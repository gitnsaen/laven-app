name: Package Desktop Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Enables manual build triggers from the GitHub Actions tab

jobs:
  build:
    name: Build Standalone Binary on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Premium stable baseline for PyWebView / GTK compatibility

    - name: Install Linux System Libraries
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository universe
        sudo apt-get update
        sudo apt-get install -y \
          python3-gi python3-gi-cairo \
          gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
          libgirepository1.0-dev \
          libgtk-3-dev \
          gcc libcairo2-dev pkg-config \
          gobject-introspection libglib2.0-dev
        pip install PyGObject
        
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name "Laven" --add-data "gui;gui" --add-data "database_schema.sql;." main.py

    - name: Build Executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --noconsole --onefile --name "laven" \
          --collect-all gi \
          --collect-all webview \
          --add-data "gui:gui" \
          --add-data "database_schema.sql:." \
          main.py

    - name: Upload Standalone App Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Laven-${{ matrix.os }}
        path: dist/
