name: Package Desktop Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Standalone Binary on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux System Libraries
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-gi python3-gi-cairo \
          gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
          libgirepository-1.0-dev \
          gcc libcairo2-dev pkg-config \
          gobject-introspection

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Install Python Dependencies (Linux gi link)
      if: matrix.os == 'ubuntu-latest'
      run: |
        SYS_GI=$(find /usr/lib/python3 -maxdepth 3 -name "gi" -type d | head -1)
        echo "Found gi at: $SYS_GI"
        SITE=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Linking into: $SITE"
        ln -sf "$SYS_GI" "$SITE/gi"
        GI_SO=$(find /usr/lib/python3 -maxdepth 4 -name "_gi*.so" | head -1)
        if [ -n "$GI_SO" ]; then
          ln -sf "$GI_SO" "$SITE/$(basename $GI_SO)"
        fi
        python -c "import gi; print('gi OK:', gi.__file__)"

    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name "Laven" --add-data "gui;gui" --add-data "database_schema.sql;." main.py

    - name: Build Executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --noconsole --onefile --name "laven" \
          --collect-all gi \
          --collect-all webview \
          --add-data "gui:gui" \
          --add-data "database_schema.sql:." \
          main.py

    - name: Upload Standalone App Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Laven-${{ matrix.os }}
        path: dist/
