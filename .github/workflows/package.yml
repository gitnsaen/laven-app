name: Package Desktop Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Standalone Binary on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python (Windows only)
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux System Libraries
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip python3-venv \
          python3-gi python3-gi-cairo \
          gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
          gcc libcairo2-dev pkg-config \
          gobject-introspection

    - name: Install Python Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        python3 -m venv --system-site-packages .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install pyinstaller pywebview

    - name: Install Python Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name "Laven" --add-data "gui;gui" --add-data "database_schema.sql;." main.py

    - name: Build Executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        .venv/bin/pyinstaller --noconsole --onefile --name "laven" \
          --collect-all gi \
          --collect-all webview \
          --add-data "gui:gui" \
          --add-data "database_schema.sql:." \
          main.py

    - name: Upload Standalone App Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Laven-${{ matrix.os }}
        path: dist/

  build-arch:
    name: Build Standalone Binary on Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          python python-pip \
          python-gobject \
          webkit2gtk-4.1 \
          gtk3 \
          gobject-introspection \
          cairo \
          pkgconf \
          gcc

    - name: Install Python Dependencies
      run: |
        # Use venv with system site-packages so python-gobject is visible
        python -m venv --system-site-packages .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install pyinstaller pywebview
        .venv/bin/python -c "import gi; print('gi OK:', gi.__file__)"

    - name: Build Executable
      run: |
        .venv/bin/pyinstaller --noconsole --onefile --name "laven" \
          --collect-all gi \
          --collect-all webview \
          --add-data "gui:gui" \
          --add-data "database_schema.sql:." \
          main.py

    - name: Upload Arch Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Laven-arch-linux
        path: dist/
