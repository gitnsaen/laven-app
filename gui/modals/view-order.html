<div id="viewOrderModal" class="modal-overlay">
    <div class="modal-container">
        <button class="modal-close" onclick="closeViewOrderModal()">
            <i data-lucide="x"></i>
        </button>

        <div class="modal-step active">
            <div class="modal-body flex-col gap-0!">
                <h2 class="modal-title">Order Details</h2>
                <div class="summary-banner"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <span id="viewOrderIdBannerText">Order #----</span>
                    <span id="viewOrderOrderStatusBadge" class="status-badge order-badge" data-status=""
                        style="font-size: 14px; padding: 8px 20px; display: none;"></span>
                </div>

                <div class="summary-grid">
                    <div class="summary-table-container">
                        <table class="summary-table">
                            <thead>
                                <tr>
                                    <th>Items</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <tbody id="viewOrderItems">
                                <!-- Dynamically populated -->
                            </tbody>
                            <tfoot>
                                <tr class="table-total">
                                    <td colspan="3">TOTAL</td>
                                    <td id="viewOrderTotal">₱0.00</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                    <div class="summary-details">
                        <div class="summary-info-block">
                            <div class="info-row">
                                <span class="info-label">Customer:</span>
                                <span class="info-tag" id="viewOrderCustomer">--</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Contact:</span>
                                <span class="info-tag" id="viewOrderContact">--</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Handled by:</span>
                                <span class="info-tag" id="viewOrderEmployee">--</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Amount Due:</span>
                                <span class="info-tag" id="viewOrderAmountDue" style="font-weight: 700;">₱0.00</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Amount Paid:</span>
                                <span class="info-tag" id="viewOrderAmountPaid" style="font-weight: 700;">₱0.00</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Payment Method:</span>
                                <span class="info-tag" id="viewOrderPaymentMethod">--</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Payment Status:</span>
                                <span class="info-tag status-tag payment-badge" id="viewOrderSummaryPaymentStatus"
                                    data-status="Unpaid">Unpaid</span>
                            </div>
                            <div class="info-row" id="viewOrderSummaryBalanceRow" style="display: none;">
                                <span class="info-label">Remaining Balance:</span>
                                <span class="info-tag" id="viewOrderSummaryBalance"
                                    style="background: var(--pending-bg); color: var(--pending-text);">₱0.00</span>
                            </div>
                        </div>

                        <div class="summary-timestamp mt-8!" id="viewOrderTimestamp">
                            --
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <div class="footer-actions ml-auto!">
                    <button class="btn-cancel" onclick="closeViewOrderModal()">Close</button>
                    <button class="btn-submit" id="viewOrderUpdateBtn" onclick="openUpdateStatusModal()">Update
                        Status</button>
                </div>
            </div>
        </div>
    </div>
</div>
