<div id="employeeModal" class="modal-overlay">
    <div class="modal-container" style="max-width: 500px; height: auto; max-height: 80vh;">
        <button class="modal-close" onclick="closeEmployeeModal()">
            <i data-lucide="x"></i>
        </button>

        <div class="modal-step active">
            <div class="modal-body flex-col gap-0! overflow-visible!">
                <h2 class="modal-title" id="employeeModalTitle">Add New Employee</h2>

                <div class="details-section w-full" style="display: flex; flex-direction: column; gap: 8px;">
                    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 0px; font-weight: 600;">Staff Information</p>
                    <div>
                        <input type="text" class="modal-input" placeholder="First Name" id="empFirstName" onkeypress="return (event.charCode < 48 || event.charCode > 57)" style="margin-bottom: 0px; width: 100%;">
                    </div>
                    <div>
                        <input type="text" class="modal-input" placeholder="Middle Initial" id="empMidInit" maxlength="2" onkeypress="return (event.charCode < 48 || event.charCode > 57)" style="margin-bottom: 0px; width: 100%;">
                    </div>
                    <div>
                        <input type="text" class="modal-input" placeholder="Last Name" id="empLastName" onkeypress="return (event.charCode < 48 || event.charCode > 57)" style="margin-bottom: 0px; width: 100%;">
                        <span id="empNameWarning" style="color: #D97706; font-size: 11px; display: none; margin-top: 4px; font-weight: 500;"></span>
                    </div>
                    <div>
                        <input type="text" class="modal-input" placeholder="Contact Number (e.g. 09123456789)" id="empContact" maxlength="11" onkeypress="return event.charCode >= 48 && event.charCode <= 57" style="margin-bottom: 0px; width: 100%;">
                        <span id="empContactWarning" style="color: #DC2626; font-size: 11px; display: none; margin-top: 4px; font-weight: 500;"></span>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <div class="footer-actions ml-auto!">
                    <button class="btn-cancel" onclick="closeEmployeeModal()">Cancel</button>
                    <button class="btn-submit" onclick="saveEmployee()">Save Employee</button>
                </div>
            </div>
        </div>
    </div>
</div>
