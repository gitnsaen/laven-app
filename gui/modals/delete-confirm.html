<div id="deleteConfirmModal" class="modal-overlay">
    <div class="modal-container" style="max-width: 450px; height: auto; max-height: 400px; padding: 32px;">
        <button class="modal-close" onclick="closeModal('deleteConfirmModal')">
            <i data-lucide="x"></i>
        </button>

        <div class="modal-body" style="padding-bottom: 0; flex-direction: column; align-items: center; text-align: center; gap: 20px;">
            <div id="deleteConfirmIconContainer" style="width: 80px; height: 80px; background: var(--pending-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--danger); margin-bottom: 8px;">
                <i id="deleteConfirmIcon" data-lucide="alert-triangle" style="width: 40px; height: 40px;"></i>
            </div>
            
            <div>
                <h2 class="modal-title" id="deleteConfirmTitle" style="margin-bottom: 8px;">Confirm Delete</h2>
                <p id="deleteConfirmMessage" style="color: var(--text-muted); font-weight: 500; font-size: 15px; line-height: 1.5;">
                    Are you sure you want to delete this entry? This action cannot be undone.
                </p>
            </div>
        </div>

        <div class="modal-footer" style="padding-top: 32px; border-top: none; gap: 12px; justify-content: center;">
            <button class="btn-cancel" onclick="closeModal('deleteConfirmModal')" style="flex: 1; min-width: auto; padding: 14px;">Keep it</button>
            <button class="btn-delete" id="deleteConfirmBtn" style="flex: 1; min-width: auto; padding: 14px; justify-content: center;">Yes, Delete</button>
        </div>
    </div>
</div>
