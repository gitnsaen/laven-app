<div class="orders-management-wrapper">
    <div class="view-header">
        <div class="view-title-group">
            <h2>Employee Management</h2>
            <p class="view-subtitle">Manage laundry shop staff.</p>
        </div>
        <button class="btn-add-new" onclick="openEmployeeModal()">
            <i data-lucide="user-plus"></i>
            Add Employee
        </button>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" class="search-input" placeholder="Search staff members...">
        </div>
    </div>

    <div class="data-table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th onclick="window.handleEmployeeSort('employeeID')" style="cursor: pointer;">Employee ID <span id="sort-icon-employeeID" class="sort-icon"></span></th>
                    <th onclick="window.handleEmployeeSort('firstName')" style="cursor: pointer;">Staff Name <span id="sort-icon-firstName" class="sort-icon"></span></th>
                    <th onclick="window.handleEmployeeSort('contactNum')" style="cursor: pointer;">Contact Number <span id="sort-icon-contactNum" class="sort-icon"></span></th>
                    <th onclick="window.handleEmployeeSort('joinedDate')" style="cursor: pointer;">Joined Date <span id="sort-icon-joinedDate" class="sort-icon"></span></th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" class="text-center" style="padding: 40px; color: var(--text-muted); text-align: center;">
                        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
                            <i data-lucide="refresh-cw" class="animate-spin" style="width: 24px; height: 24px; opacity: 0.6; animation: spin 2s linear infinite;"></i>
                            <span>Loading staff...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-footer">
        <p class="pagination-info"></p>
        <div class="pagination-controls"></div>
    </div>
</div>
